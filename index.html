<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jay's Lent Devotional</title>

  <!-- SUIT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    @font-face{
      font-family:'HannaPro';
      src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_seven@1.0/BMHANNAPro.woff') format('woff');
      font-display:swap;
    }

    :root{
      --bg:#121212;
      --bg2:#101010;
      --ink:#f1efe9;
      --muted:#b9b6b0;
      --muted2:#9a9893;

      --accent:#ffb55c;
      --accent2:#ff7a18;

      --line:rgba(255,255,255,.08);
      --soft:rgba(255,181,92,.14);
      --shadow:0 14px 34px rgba(0,0,0,.45);

      --playerBgA: rgba(255,181,92,.14);
      --playerBgB: rgba(255,122,24,.10);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"SUIT",-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
      background:
        radial-gradient(1000px 380px at 20% -10%, rgba(255,181,92,.16), transparent 60%),
        radial-gradient(800px 360px at 90% 20%, rgba(255,122,24,.10), transparent 62%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--ink);
    }

    .wrap{max-width:820px;margin:0 auto;padding:26px 18px 80px}

    h1{
      margin:0;
      font-size:28px;
      font-family:'HannaPro',sans-serif;
    }
    .sub{margin-top:8px;color:var(--muted)}

    /* card */
    .card{
      background:rgba(32,32,34,.92);
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      margin:18px 0;
      box-shadow:var(--shadow);
    }
    .meta{color:var(--accent);font-weight:900}
    .theme-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .theme{
      font-family:'HannaPro';
      font-size:20px;
      margin:4px 0;
    }
    .vibe{
      display:inline-flex;gap:6px;align-items:center;
      padding:4px 10px;border-radius:999px;
      border:1px solid rgba(255,181,92,.18);
      background:rgba(18,18,18,.45);
      font-size:12px;font-weight:800;
    }
    .vibe .icon{color:var(--accent)}

    .scripture{color:var(--muted);font-size:14px}

    /* ===== 🎵 Song chip (A 적용) ===== */
    .songline{
      margin-top:8px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      font-size:13px;
    }
    .songchip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid rgba(255,181,92,.22);
      background:rgba(255,181,92,.12);
      color:rgba(241,239,233,.96);
      font-weight:900;
    }
    .songchip .note{
      width:22px;height:22px;
      display:flex;align-items:center;justify-content:center;
      border-radius:8px;
      background:rgba(255,181,92,.18);
      border:1px solid rgba(255,181,92,.25);
      color:var(--accent);
    }
    .songmeta{
      color:var(--muted2);
      font-size:12px;
      font-weight:800;
    }

    /* player */
    .player{
      margin-top:12px;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:
        radial-gradient(800px 260px at 10% 0%, var(--playerBgA), transparent 60%),
        radial-gradient(700px 260px at 95% 40%, var(--playerBgB), transparent 60%),
        rgba(18,18,18,.6);
    }
    .player-head{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:8px;
    }
    .link{
      font-size:12px;font-weight:900;
      color:var(--accent);
      background:var(--soft);
      padding:6px 10px;border-radius:999px;
      text-decoration:none;
      border:1px solid rgba(255,181,92,.22);
    }
    iframe{width:100%;height:110px;border:0;border-radius:12px}

    .one-liner{
      margin-top:12px;
      white-space:pre-line;
      color:rgba(241,239,233,.95);
    }

    @media(max-width:480px){
      iframe{height:90px}
    }
  </style>
</head>

<body>
<div class="wrap">
  <h1>Jay's Lent Devotional</h1>
  <div class="sub">멈추고, 하나님께 머무는 사순절</div>

  <!-- 예시 카드 (2/21) -->
  <section class="card">
    <div class="meta">🗓️ 2월 21일 (토)</div>
    <div class="theme-row">
      <h2 class="theme">Remembering to Forget</h2>
      <span class="vibe"><span class="icon">🌿</span> 기억 · 회복</span>
    </div>
    <div class="scripture">📖 시편 42:1–8</div>

    <div class="songline">
      <span class="songchip"><span class="note">♪</span><span>너는 너의 하나님을 바라라</span></span>
      <span class="songchip"><span class="note">♪</span><span>목마른 사슴이</span></span>
      <span class="songmeta">탭을 눌러 전환</span>
    </div>

    <div class="player">
      <div class="player-head">
        <div>🎧 듣기</div>
        <a class="link" href="#" target="_blank">Drive에서 열기</a>
      </div>
      <iframe src=""></iframe>
    </div>

    <p class="one-liner">
잊어야 할 것들을 내려놓고
다시 하나님을 기억하는 연습
    </p>
  </section>

</div>
</body>
</html>
